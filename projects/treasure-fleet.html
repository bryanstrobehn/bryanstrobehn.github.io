<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Treasure Fleet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Teko:wght@400;600&display=swap');

  :root {
    --ocean: #0b2a3a;
    --plank: #5c3a1e;
    --plank-light: #7a4e2a;
    --gold: #f0c040;
    --gold-dark: #c49a10;
    --parchment: #f5e9c8;
    --red: #b82020;
    --ink: #1a0e05;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ocean);
    font-family: 'Teko', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
    padding-bottom: 40px;
  }

  .ocean {
    position: fixed; inset: 0;
    background:
      repeating-linear-gradient(175deg, transparent 0px, transparent 28px,
        rgba(255,255,255,0.03) 28px, rgba(255,255,255,0.03) 30px),
      linear-gradient(180deg, #0b2a3a 0%, #0d3d52 60%, #0b2a3a 100%);
    animation: drift 8s ease-in-out infinite alternate;
    z-index: 0;
  }
  @keyframes drift { from { background-position: 0 0; } to { background-position: 40px 20px; } }

  .deck {
    position: fixed; bottom: 0; left: 0; right: 0; height: 28%;
    background: repeating-linear-gradient(90deg,
      var(--plank) 0px, var(--plank) 58px, var(--plank-light) 58px, var(--plank-light) 116px);
    border-top: 4px solid #3a2010;
    box-shadow: 0 -6px 30px rgba(0,0,0,0.5);
    z-index: 0;
  }
  .deck::before { content:''; position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, transparent 40%); }

  .container {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center;
    gap: 14px; padding: 20px 16px 0; width: 100%; max-width: 400px;
  }

  h1 {
    font-family: 'Uncial Antiqua', serif;
    color: var(--gold); font-size: 2rem; letter-spacing: 0.08em;
    text-shadow: 2px 3px 0 var(--ink), 0 0 24px rgba(240,192,64,0.5);
    text-align: center;
  }

  /* ── Die type selector ── */
  .die-selector {
    display: flex; gap: 7px; flex-wrap: wrap; justify-content: center;
  }
  .die-type-btn {
    padding: 5px 11px;
    background: linear-gradient(180deg, #4d2e14, #2a1508);
    border: 2px solid var(--gold-dark);
    border-radius: 7px;
    color: var(--gold);
    font-family: 'Teko', sans-serif;
    font-size: 1rem; letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .die-type-btn:active { transform: scale(0.93); }
  .die-type-btn.active {
    background: linear-gradient(135deg, #f0c040, #c49a10);
    border-color: var(--gold); color: var(--ink);
    box-shadow: 0 0 12px rgba(240,192,64,0.5);
  }

  /* ── Track ── */
  .track {
    width: 100%; height: 110px;
    background: linear-gradient(180deg, #3a2010 0%, #4d2e14 50%, #3a2010 100%);
    border-radius: 12px; border: 3px solid var(--gold-dark);
    box-shadow: inset 0 4px 18px rgba(0,0,0,0.6), 0 0 0 1px #8a6010, 0 6px 24px rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden; flex-shrink: 0;
  }
  .track::after {
    content: '☠'; position: absolute; top: 6px; left: 10px;
    color: rgba(240,192,64,0.18); font-size: 1.3rem;
  }

  /* SVG die face */
  .die-svg {
    width: 80px; height: 80px;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.8));
    transform-origin: center center;
  }

  @keyframes roll {
    0%   { transform: translateX(-130px) rotate(0deg);    opacity: 0; }
    8%   { opacity: 1; }
    50%  { transform: translateX(0px)    rotate(540deg); }
    92%  { opacity: 1; }
    100% { transform: translateX(130px)  rotate(1080deg); opacity: 0; }
  }
  @keyframes settle {
    0%   { transform: translateX(130px) rotate(1080deg) scale(1);   opacity: 0; }
    12%  { opacity: 1; }
    55%  { transform: translateX(-10px) rotate(1150deg) scale(1.1); }
    72%  { transform: translateX(5px)   rotate(1160deg) scale(0.94); }
    86%  { transform: translateX(-2px)  rotate(1164deg) scale(1.03); }
    100% { transform: translateX(0)     rotate(1166deg) scale(1);   opacity: 1; }
  }
  .die-svg.rolling  { animation: roll   0.55s cubic-bezier(0.4,0,0.6,1) forwards; }
  .die-svg.settling { animation: settle 0.52s cubic-bezier(0.22,1,0.36,1) forwards; }

  .result {
    font-family: 'Uncial Antiqua', serif; font-size: 4.5rem;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(240,192,64,0.7), 2px 4px 0 var(--ink);
    min-height: 68px; line-height: 1; opacity: 0; text-align: center;
  }
  .result.show { opacity: 1; }
  .result.flash { animation: flashIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  @keyframes flashIn {
    0%   { transform: scale(1.7); opacity: 0; color: #fff; }
    60%  { transform: scale(0.94); }
    100% { transform: scale(1);   opacity: 1; color: var(--gold); }
  }

  .flavor {
    font-family: 'Uncial Antiqua', serif; color: var(--parchment);
    font-size: 0.85rem; letter-spacing: 0.05em; min-height: 1.2rem;
    text-shadow: 1px 1px 0 var(--ink); opacity: 0; text-align: center;
  }
  .flavor.show { opacity: 1; transition: opacity 0.3s; }

  .btn-roll {
    background: linear-gradient(180deg, #c0392b 0%, #8e1a10 100%);
    color: var(--parchment); border: 2px solid #e05040; border-radius: 8px;
    font-family: 'Uncial Antiqua', serif; font-size: 1.2rem;
    padding: 9px 32px; cursor: pointer;
    box-shadow: 0 4px 0 #5a0e08, 0 6px 18px rgba(0,0,0,0.5);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn-roll:active { transform: translateY(3px); box-shadow: 0 1px 0 #5a0e08; }
  .btn-roll:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  .history {
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
    min-height: 30px; width: 100%;
  }
  .hist-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #7a5020, #3a2010);
    border: 2px solid var(--gold-dark); color: var(--gold);
    font-family: 'Teko', sans-serif; font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
    animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .rope {
    width: 90%; height: 5px;
    background: repeating-linear-gradient(90deg, #7a5a2a 0px, #a07840 4px, #7a5a2a 8px);
    border-radius: 3px; opacity: 0.7;
  }

  /* ── Setup ── */
  .setup-section {
    width: 100%;
    background: linear-gradient(180deg, #3a2010, #2a1508);
    border: 2px solid var(--gold-dark); border-radius: 12px;
    padding: 12px 16px;
    box-shadow: inset 0 2px 12px rgba(0,0,0,0.5);
    display: flex; flex-direction: column; gap: 10px;
  }
  .setup-label {
    font-family: 'Uncial Antiqua', serif; color: var(--gold);
    font-size: 1rem; text-align: center; letter-spacing: 0.06em;
  }
  .player-count-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
  .count-btn {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, #4d2e14, #2a1508);
    border: 2px solid var(--gold-dark); color: var(--gold);
    font-family: 'Teko', sans-serif; font-size: 1.1rem;
    cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    transition: background 0.15s, border-color 0.15s;
  }
  .count-btn.active {
    background: linear-gradient(135deg, #f0c040, #c49a10);
    border-color: var(--gold); color: var(--ink);
    box-shadow: 0 0 12px rgba(240,192,64,0.5);
  }

  /* ── Crew grid ── */
  .crew-grid {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 180px));
    gap: 10px;
    justify-content: center;
  }

  .crew-card {
    background: linear-gradient(180deg, #3a2010 0%, #2a1508 100%);
    border: 2px solid var(--gold-dark); border-radius: 10px;
    padding: 10px 10px 8px;
    display: flex; flex-direction: column; gap: 8px;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.4), 0 4px 12px rgba(0,0,0,0.3);
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  .crew-name-input {
    background: rgba(0,0,0,0.3); border: 1px solid rgba(240,192,64,0.3);
    border-radius: 5px; color: var(--parchment);
    font-family: 'Uncial Antiqua', serif; font-size: 0.78rem;
    padding: 4px 8px; text-align: center; outline: none; width: 100%;
  }
  .crew-name-input:focus { border-color: var(--gold); }
  .crew-name-input::placeholder { color: rgba(240,192,64,0.3); font-style: italic; }

  /* Gold sub-section (Booty / Banked) */
  .gold-section {
    display: flex; flex-direction: column; gap: 3px;
  }
  .gold-section-label {
    font-family: 'Uncial Antiqua', serif; color: var(--gold);
    font-size: 0.62rem; letter-spacing: 0.05em; text-align: center;
    opacity: 0.8;
  }
  .gold-control {
    display: flex; align-items: center; gap: 4px;
  }
  .mini-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid var(--gold-dark);
    background: linear-gradient(135deg, #f0c040 0%, #c49a10 100%);
    color: var(--ink); font-size: 1.1rem; font-weight: bold;
    cursor: pointer; box-shadow: 0 2px 0 #7a6000;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Teko', sans-serif; line-height: 1;
    flex-shrink: 0;
    /* prevent double-fire on touch */
    touch-action: manipulation;
    user-select: none;
  }
  .mini-btn:active { transform: translateY(1px); box-shadow: 0 0 0 #7a6000; }

  .gold-input {
    flex: 1; min-width: 0; text-align: center;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(240,192,64,0.35); border-radius: 5px;
    color: var(--gold); font-family: 'Uncial Antiqua', serif;
    font-size: 1.15rem; padding: 3px 2px; outline: none;
  }
  .gold-input:focus { border-color: var(--gold); }

  .section-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(240,192,64,0.25), transparent);
  }

  .skull-reset {
    align-self: center;
    background: none; border: none; color: rgba(240,192,64,0.2);
    cursor: pointer; font-size: 0.75rem; padding: 0;
    transition: color 0.2s; line-height: 1;
    touch-action: manipulation;
  }
  .skull-reset:hover { color: var(--red); }

  .gold-flash-anim { animation: goldPulse 0.3s ease-out; }
  @keyframes goldPulse {
    0%   { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
</style>
</head>

<div class="ocean"></div>
<div class="deck"></div>

<div class="container">
  <h1>⚓ Treasure Fleet ⚓</h1>

  <!-- Die selector -->
  <div class="die-selector" id="die-selector"></div>

  <!-- Track with SVG die -->
  <div class="track">
    <svg class="die-svg" id="die-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div class="result" id="result"></div>
  <div class="flavor"  id="flavor"></div>

  <button class="btn-roll" id="btn" onclick="rollDie()">⚓ Roll the Bones</button>

  <div class="history" id="history"></div>
  <div class="rope"></div>

  <!-- Player setup -->
  <div class="setup-section">
    <div class="setup-label">⚜ How many pirates? ⚜</div>
    <div class="player-count-row" id="count-row"></div>
  </div>

  <div class="crew-grid" id="crew-grid"></div>
</div>

<script>
// ─────────────────────────────────────────────
// DIE DEFINITIONS — 3D SVG with gradients
// ─────────────────────────────────────────────

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}
function clearSvg(svg) { while (svg.firstChild) svg.removeChild(svg.firstChild); }

// Inject shared defs (gradients/filters) once per SVG
function injectDefs(svg, id, shape) {
  const defs = svgEl('defs', {});

  // Main face gradient — gold with lit top-left
  const gFace = svgEl('radialGradient', { id: `gf${id}`, cx: '35%', cy: '30%', r: '65%' });
  gFace.appendChild(svgEl('stop', { offset: '0%',   'stop-color': '#ffe97a' }));
  gFace.appendChild(svgEl('stop', { offset: '55%',  'stop-color': '#d4a820' }));
  gFace.appendChild(svgEl('stop', { offset: '100%', 'stop-color': '#7a5000' }));
  defs.appendChild(gFace);

  // Edge/bevel gradient — dark bottom-right
  const gEdge = svgEl('linearGradient', { id: `ge${id}`, x1: '0%', y1: '0%', x2: '100%', y2: '100%' });
  gEdge.appendChild(svgEl('stop', { offset: '0%',   'stop-color': '#c49010', 'stop-opacity': '0.0' }));
  gEdge.appendChild(svgEl('stop', { offset: '100%', 'stop-color': '#3a1a00', 'stop-opacity': '0.55' }));
  defs.appendChild(gEdge);

  // Specular highlight gradient
  const gSpec = svgEl('radialGradient', { id: `gs${id}`, cx: '30%', cy: '25%', r: '45%' });
  gSpec.appendChild(svgEl('stop', { offset: '0%',   'stop-color': '#fff', 'stop-opacity': '0.45' }));
  gSpec.appendChild(svgEl('stop', { offset: '100%', 'stop-color': '#fff', 'stop-opacity': '0.00' }));
  defs.appendChild(gSpec);

  // Drop shadow filter
  const filt = svgEl('filter', { id: `fshadow${id}`, x: '-20%', y: '-20%', width: '140%', height: '140%' });
  const fe = svgEl('feDropShadow', { dx: '2', dy: '4', stdDeviation: '3', 'flood-color': '#000', 'flood-opacity': '0.6' });
  filt.appendChild(fe);
  defs.appendChild(filt);

  svg.appendChild(defs);
}

function addText(svg, val, x, y, size) {
  if (val == null) return;
  // shadow
  const ts = svgEl('text', { x: x+1, y: y+1.5, 'font-family': 'Uncial Antiqua, serif',
    'font-size': size, fill: '#3a1a00', 'text-anchor': 'middle', 'dominant-baseline': 'central',
    'font-weight': 'bold', opacity: '0.5' });
  ts.textContent = val;
  svg.appendChild(ts);
  const t = svgEl('text', { x, y, 'font-family': 'Uncial Antiqua, serif',
    'font-size': size, fill: '#1a0800', 'text-anchor': 'middle', 'dominant-baseline': 'central',
    'font-weight': 'bold' });
  t.textContent = val;
  svg.appendChild(t);
}

// Helper: apply face + bevel + specular fills to a shape element
function layerShape(svg, id, makeShape) {
  // base shadow shape (offset)
  const shadow = makeShape();
  shadow.setAttribute('transform', 'translate(2.5,4)');
  shadow.setAttribute('fill', 'rgba(0,0,0,0.35)');
  shadow.removeAttribute('stroke');
  svg.appendChild(shadow);
  // face
  const face = makeShape();
  face.setAttribute('fill', `url(#gf${id})`);
  face.setAttribute('stroke', '#3a1800');
  face.setAttribute('stroke-width', '2');
  svg.appendChild(face);
  // bevel overlay
  const bevel = makeShape();
  bevel.setAttribute('fill', `url(#ge${id})`);
  bevel.setAttribute('stroke', 'none');
  svg.appendChild(bevel);
  // specular
  const spec = makeShape();
  spec.setAttribute('fill', `url(#gs${id})`);
  spec.setAttribute('stroke', 'none');
  svg.appendChild(spec);
}

let _dieId = 0;

// D4 — tetrahedron face (triangle)
function drawD4(svg, val) {
  clearSvg(svg);
  const id = ++_dieId;
  injectDefs(svg, id);
  layerShape(svg, id, () => svgEl('polygon', { points: '50,6 94,84 6,84' }));
  // inner edge lines for 3D feel
  const inner = svgEl('polygon', { points: '50,24 79,75 21,75',
    fill: 'none', stroke: 'rgba(255,220,80,0.18)', 'stroke-width': '1.5' });
  svg.appendChild(inner);
  addText(svg, val, 50, 68, 26);
}

// D6 — cube face (rounded square)
function drawD6(svg, val) {
  clearSvg(svg);
  const id = ++_dieId;
  injectDefs(svg, id);
  layerShape(svg, id, () => svgEl('rect', { x: 7, y: 7, width: 86, height: 86, rx: 14, ry: 14 }));
  // corner accent lines
  svg.appendChild(svgEl('rect', { x: 12, y: 12, width: 76, height: 76, rx: 10, ry: 10,
    fill: 'none', stroke: 'rgba(255,220,80,0.15)', 'stroke-width': '1.5' }));
  addText(svg, val, 50, 51, val != null && val >= 10 ? 30 : 36);
}

// D8 — octahedron face (diamond)
function drawD8(svg, val) {
  clearSvg(svg);
  const id = ++_dieId;
  injectDefs(svg, id);
  layerShape(svg, id, () => svgEl('polygon', { points: '50,5 94,50 50,95 6,50' }));
  // inner diamond
  svg.appendChild(svgEl('polygon', { points: '50,20 79,50 50,80 21,50',
    fill: 'none', stroke: 'rgba(255,220,80,0.15)', 'stroke-width': '1.5' }));
  addText(svg, val, 50, 51, 30);
}

// D10 — kite/trapezoidal shape
function drawD10(svg, val) {
  clearSvg(svg);
  const id = ++_dieId;
  injectDefs(svg, id);
  layerShape(svg, id, () => svgEl('polygon', { points: '50,5 91,36 78,88 22,88 9,36' }));
  svg.appendChild(svgEl('polygon', { points: '50,20 76,42 66,76 34,76 24,42',
    fill: 'none', stroke: 'rgba(255,220,80,0.15)', 'stroke-width': '1.5' }));
  addText(svg, val, 50, 56, val != null && val >= 10 ? 26 : 30);
}

// D12 — dodecahedron face (pentagon)
function drawD12(svg, val) {
  clearSvg(svg);
  const id = ++_dieId;
  injectDefs(svg, id);
  const pts = (r, ox=50, oy=50) => Array.from({length:5}, (_,i) => {
    const a = (i*72 - 90)*Math.PI/180;
    return `${ox+r*Math.cos(a)},${oy+r*Math.sin(a)}`;
  }).join(' ');
  layerShape(svg, id, () => svgEl('polygon', { points: pts(44) }));
  svg.appendChild(svgEl('polygon', { points: pts(32),
    fill: 'none', stroke: 'rgba(255,220,80,0.15)', 'stroke-width': '1.5' }));
  addText(svg, val, 50, 52, val != null && val >= 10 ? 25 : 28);
}

// D20 — icosahedron face (triangle with inner triangle)
function drawD20(svg, val) {
  clearSvg(svg);
  const id = ++_dieId;
  injectDefs(svg, id);
  layerShape(svg, id, () => svgEl('polygon', { points: '50,4 96,86 4,86' }));
  // inner inverted triangle
  svg.appendChild(svgEl('polygon', { points: '50,74 30,38 70,38',
    fill: 'none', stroke: 'rgba(255,220,80,0.18)', 'stroke-width': '1.5' }));
  addText(svg, val, 50, 65, val != null && val >= 10 ? 23 : 27);
}

// D100 — sphere (circle)
function drawD100(svg, val) {
  clearSvg(svg);
  const id = ++_dieId;
  injectDefs(svg, id);
  // shadow
  svg.appendChild(svgEl('ellipse', { cx: 52, cy: 55, rx: 43, ry: 43,
    fill: 'rgba(0,0,0,0.35)' }));
  svg.appendChild(svgEl('circle', { cx: 50, cy: 50, r: 43,
    fill: `url(#gf${id})`, stroke: '#3a1800', 'stroke-width': '2' }));
  svg.appendChild(svgEl('circle', { cx: 50, cy: 50, r: 43,
    fill: `url(#ge${id})`, stroke: 'none' }));
  svg.appendChild(svgEl('circle', { cx: 50, cy: 50, r: 43,
    fill: `url(#gs${id})`, stroke: 'none' }));
  // inner ring
  svg.appendChild(svgEl('circle', { cx: 50, cy: 50, r: 33,
    fill: 'none', stroke: 'rgba(255,220,80,0.15)', 'stroke-width': '1.5' }));
  addText(svg, val, 50, 51, val != null && val >= 10 ? 22 : 26);
}

const DIE_TYPES = [
  { sides: 4,   label: 'd4',   draw: drawD4   },
  { sides: 6,   label: 'd6',   draw: drawD6   },
  { sides: 8,   label: 'd8',   draw: drawD8   },
  { sides: 10,  label: 'd10',  draw: drawD10  },
  { sides: 12,  label: 'd12',  draw: drawD12  },
  { sides: 20,  label: 'd20',  draw: drawD20  },
  { sides: 100, label: 'd100', draw: drawD100 },
];

// ─────────────────────────────────────────────
// FLAVOR TEXT
// ─────────────────────────────────────────────
const FLAVOR_GENERIC = [
  "The seas hold their breath...",
  "Fortune favors the bold!",
  "Yer fate is sealed, matey.",
  "The Kraken watches.",
  "Jolly Roger flies high!",
  "Arrr, not bad for a landlubber.",
  "Davy Jones nods in approval.",
  "The crow's nest cheers!",
];
function getFlavor(val, sides) {
  if (val === 1) return "Davy Jones takes yer turn...";
  if (val === sides) return `⚓ ${sides}! ALL HANDS! ⚓`;
  return FLAVOR_GENERIC[val % FLAVOR_GENERIC.length];
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let rolling = false;
let currentDieIdx = 2; // default d8
let playerCount = 2;

const dieSvg   = document.getElementById('die-svg');
const result   = document.getElementById('result');
const flavorEl = document.getElementById('flavor');
const btn      = document.getElementById('btn');
const history  = document.getElementById('history');
const crewGrid = document.getElementById('crew-grid');
const countRow = document.getElementById('count-row');
const selector = document.getElementById('die-selector');

// ─────────────────────────────────────────────
// DIE SELECTOR BUTTONS
// ─────────────────────────────────────────────
DIE_TYPES.forEach((dt, i) => {
  const b = document.createElement('button');
  b.className = 'die-type-btn' + (i === currentDieIdx ? ' active' : '');
  b.textContent = dt.label;
  b.addEventListener('click', () => {
    currentDieIdx = i;
    selector.querySelectorAll('.die-type-btn').forEach((x, j) => x.classList.toggle('active', j === i));
    DIE_TYPES[i].draw(dieSvg, null);
    result.classList.remove('show', 'flash');
    flavorEl.classList.remove('show');
  });
  selector.appendChild(b);
});

// Draw initial die face (no value)
DIE_TYPES[currentDieIdx].draw(dieSvg, null);

// ─────────────────────────────────────────────
// ROLL
// ─────────────────────────────────────────────
function rollDie() {
  if (rolling) return;
  rolling = true;
  btn.disabled = true;

  result.classList.remove('show', 'flash');
  flavorEl.classList.remove('show');
  flavorEl.textContent = '';

  const dt = DIE_TYPES[currentDieIdx];
  const value = Math.floor(Math.random() * dt.sides) + 1;

  // Draw blank face during roll
  dt.draw(dieSvg, null);
  dieSvg.classList.remove('rolling', 'settling');
  void dieSvg.offsetWidth;
  dieSvg.classList.add('rolling');

  setTimeout(() => {
    dieSvg.classList.remove('rolling');
    void dieSvg.offsetWidth;
    dt.draw(dieSvg, value);
    dieSvg.classList.add('settling');

    setTimeout(() => {
      dieSvg.classList.remove('settling');

      result.textContent = value;
      result.classList.add('show');
      void result.offsetWidth;
      result.classList.add('flash');

      flavorEl.textContent = getFlavor(value, dt.sides);
      flavorEl.classList.add('show');

      const h = document.createElement('div');
      h.className = 'hist-num';
      h.textContent = value;
      history.appendChild(h);
      if (history.children.length > 10) history.removeChild(history.firstChild);

      rolling = false;
      btn.disabled = false;
    }, 540);
  }, 580);
}

// ─────────────────────────────────────────────
// PLAYER COUNT BUTTONS
// ─────────────────────────────────────────────
for (let i = 1; i <= 6; i++) {
  const b = document.createElement('button');
  b.className = 'count-btn' + (i === playerCount ? ' active' : '');
  b.textContent = i;
  b.addEventListener('click', () => {
    playerCount = i;
    countRow.querySelectorAll('.count-btn').forEach((x, j) => x.classList.toggle('active', j + 1 === i));
    buildCrew();
  });
  countRow.appendChild(b);
}

// ─────────────────────────────────────────────
// CREW CARDS
// ─────────────────────────────────────────────
const PIRATE_NAMES = ["Captain", "Rogue", "Buccaneer", "Corsair", "Privateer", "Scallywag"];

function makeGoldSection(labelText) {
  // Returns { section el, getValue, setValue }
  let value = 0;

  const section = document.createElement('div');
  section.className = 'gold-section';

  const lbl = document.createElement('div');
  lbl.className = 'gold-section-label';
  lbl.textContent = labelText;

  const ctrl = document.createElement('div');
  ctrl.className = 'gold-control';

  const minusBtn = document.createElement('button');
  minusBtn.className = 'mini-btn';
  minusBtn.textContent = '−';
  minusBtn.type = 'button';

  const input = document.createElement('input');
  input.className = 'gold-input';
  input.type = 'number';
  input.min = 0;
  input.value = 0;

  const plusBtn = document.createElement('button');
  plusBtn.className = 'mini-btn';
  plusBtn.textContent = '+';
  plusBtn.type = 'button';

  ctrl.append(minusBtn, input, plusBtn);
  section.append(lbl, ctrl);

  function flashInput() {
    input.classList.remove('gold-flash-anim');
    void input.offsetWidth;
    input.classList.add('gold-flash-anim');
  }

  function setValue(v) {
    value = Math.max(0, Math.round(v));
    input.value = value;
    flashInput();
  }

  // Use pointerdown + preventDefault to avoid ghost clicks on touch
  minusBtn.addEventListener('pointerdown', e => {
    e.preventDefault();
    setValue(value - 1);
  });
  plusBtn.addEventListener('pointerdown', e => {
    e.preventDefault();
    setValue(value + 1);
  });

  input.addEventListener('change', () => {
    const v = parseInt(input.value);
    value = isNaN(v) ? 0 : Math.max(0, v);
    input.value = value;
  });

  return {
    section,
    getValue: () => value,
    setValue,
  };
}

function buildCrew() {
  crewGrid.innerHTML = '';

  for (let i = 0; i < playerCount; i++) {
    const card = document.createElement('div');
    card.className = 'crew-card';

    const nameInput = document.createElement('input');
    nameInput.className = 'crew-name-input';
    nameInput.type = 'text';
    nameInput.maxLength = 14;
    nameInput.placeholder = PIRATE_NAMES[i];

    const booty  = makeGoldSection('⚓ Booty (Ship)');
    const banked = makeGoldSection('🏴 Banked (Port)');

    const divider = document.createElement('div');
    divider.className = 'section-divider';

    const skull = document.createElement('button');
    skull.className = 'skull-reset';
    skull.textContent = '☠ scuttle all';
    skull.type = 'button';
    skull.addEventListener('pointerdown', e => {
      e.preventDefault();
      booty.setValue(0);
      banked.setValue(0);
    });

    card.append(nameInput, booty.section, divider, banked.section, skull);
    crewGrid.appendChild(card);
  }
}

buildCrew();
</script>
</body>
