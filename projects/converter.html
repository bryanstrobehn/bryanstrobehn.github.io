<!DOCTYPE html>
<html lang="en">
<head>
    <script src="coi-serviceworker.min.js"></script>
    <!-- This is used with the related file in the directory, provides missing HTTPS headers for ffmpeg -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONVERT STUFF // MEDIA UTILITY</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0c10;
    --surface:  #0e1117;
    --panel:    #131720;
    --border:   #1e2535;
    --border2:  #2a3550;
    --cyan:     #00e5ff;
    --cyan-dim: #007a8a;
    --amber:    #ffb300;
    --green:    #00e676;
    --red:      #ff1744;
    --muted:    #4a5568;
    --text:     #c8d6f0;
    --text-dim: #6b7a99;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: calc(2rem + 44px) 1rem 2rem;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none; z-index: 0;
  }

  .wrap { width: 100%; max-width: 720px; position: relative; z-index: 1; }

  /* ── Header ── */
  .header {
    display: flex; align-items: baseline; gap: 12px;
    margin-bottom: 2.5rem; border-bottom: 1px solid var(--border2); padding-bottom: 1rem;
  }
  .header-title { font-family: 'Share Tech Mono', monospace; font-size: 1.4rem; color: var(--cyan); letter-spacing: 0.08em; }
  .header-sub   { font-size: 0.85rem; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; }
  .header-dot   { width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); animation: pulse 2s infinite; margin-left: auto; box-shadow: 0 0 8px var(--cyan); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Category tabs ── */
  .cat-tabs {
    display: flex; gap: 2px; margin-bottom: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 2px 2px 0 0; padding: 2px;
  }
  .cat-tab {
    flex: 1; padding: 0.55rem 0.75rem;
    font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; letter-spacing: 0.1em;
    background: transparent; border: 1px solid transparent; color: var(--text-dim);
    cursor: pointer; border-radius: 2px; transition: all 0.15s; text-transform: uppercase;
  }
  .cat-tab:hover { color: var(--text); background: var(--panel); }
  .cat-tab.active { background: var(--panel); color: var(--cyan); border-color: var(--border2); }
  .cat-tab.active::before { content: '▶ '; }

  /* ── Conversion selector ── */
  .conv-selector {
    background: var(--panel); border: 1px solid var(--border); border-top: none;
    padding: 0.75rem 1rem; display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem;
    border-radius: 0 0 2px 2px;
  }
  .conv-btn {
    padding: 0.35rem 0.75rem;
    font-family: 'Share Tech Mono', monospace; font-size: 0.72rem; letter-spacing: 0.08em;
    background: var(--surface); border: 1px solid var(--border2); color: var(--text-dim);
    cursor: pointer; border-radius: 2px; transition: all 0.15s; text-transform: uppercase; white-space: nowrap;
  }
  .conv-btn:hover { color: var(--text); border-color: var(--cyan-dim); }
  .conv-btn.active { color: var(--cyan); border-color: var(--cyan); background: rgba(0,229,255,0.06); }

  /* ── Work panel ── */
  .work-panel {
    background: var(--panel); border: 1px solid var(--border); border-radius: 2px;
    padding: 1.5rem; margin-bottom: 1.5rem;
  }

  .section-label {
    font-family: 'Share Tech Mono', monospace; font-size: 0.72rem; color: var(--cyan-dim);
    letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 0.75rem;
  }

  /* ── Drop zone ── */
  .drop-zone {
    border: 1px dashed var(--border2); border-radius: 2px; padding: 2.2rem 1.5rem;
    text-align: center; cursor: pointer; transition: all 0.2s; background: var(--surface);
    position: relative; overflow: hidden;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--cyan); background: rgba(0,229,255,0.04); }
  .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-icon  { font-size: 1.6rem; margin-bottom: 0.4rem; color: var(--cyan-dim); font-family: 'Share Tech Mono', monospace; }
  .drop-label { font-size: 1rem; color: var(--text); font-weight: 600; }
  .drop-hint  { font-size: 0.78rem; color: var(--text-dim); margin-top: 0.2rem; font-family: 'Share Tech Mono', monospace; }
  .file-chosen { margin-top: 0.6rem; font-family: 'Share Tech Mono', monospace; font-size: 0.78rem; color: var(--green); }

  /* ── Options row ── */
  .options-row {
    display: flex; align-items: center; gap: 1rem;
    margin-top: 1rem; margin-bottom: 1rem; padding: 0.65rem 1rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 2px;
  }
  .options-label { font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.1em; white-space: nowrap; }
  .options-row select {
    flex: 1; background: var(--panel); border: 1px solid var(--border2); color: var(--text);
    font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; padding: 0.35rem 0.6rem;
    border-radius: 2px; outline: none; cursor: pointer;
  }
  .options-row select:focus { border-color: var(--cyan); }

  /* ── Sliders ── */
  .slider-opts { display: flex; flex-direction: column; gap: 0.65rem; margin-top: 1rem; }
  .slider-row  { display: flex; align-items: center; gap: 1rem; }
  .slider-row label { font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.1em; width: 90px; flex-shrink: 0; }
  .slider-row input[type=range] { flex: 1; accent-color: var(--cyan); }
  .slider-row .val { font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: var(--cyan); width: 64px; text-align: right; }

  /* ── Progress ── */
  .progress-wrap { height: 3px; background: var(--border); border-radius: 1px; margin-bottom: 0.75rem; overflow: hidden; display: none; }
  .progress-wrap.visible { display: block; }
  .progress-bar { height: 100%; width: 0%; background: var(--cyan); transition: width 0.3s; box-shadow: 0 0 8px var(--cyan); }

  /* ── Convert button ── */
  .btn-convert {
    width: 100%; padding: 0.85rem; background: transparent; border: 1px solid var(--cyan);
    color: var(--cyan); font-family: 'Share Tech Mono', monospace; font-size: 0.9rem;
    letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: all 0.2s;
  }
  .btn-convert:disabled { border-color: var(--muted); color: var(--muted); cursor: not-allowed; }
  .btn-convert:not(:disabled):hover { background: rgba(0,229,255,0.1); box-shadow: 0 0 16px rgba(0,229,255,0.2); }
  .btn-convert.processing { animation: borderPulse 1s infinite; }
  @keyframes borderPulse { 0%,100%{border-color:var(--cyan)} 50%{border-color:var(--cyan-dim)} }

  /* ── Download button ── */
  .btn-dl {
    display: none; width: 100%; margin-top: 0.75rem; padding: 0.75rem;
    background: rgba(0,230,118,0.1); border: 1px solid var(--green); color: var(--green);
    font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; letter-spacing: 0.15em;
    text-transform: uppercase; cursor: pointer; border-radius: 2px; text-align: center;
    text-decoration: none; transition: all 0.2s;
  }
  .btn-dl:hover { background: rgba(0,230,118,0.18); }
  .btn-dl.visible { display: block; }

  /* ── Log ── */
  .log-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 2px;
    padding: 1rem; min-height: 72px; font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem; color: var(--text-dim); line-height: 1.7;
    white-space: pre-wrap; word-break: break-all; max-height: 180px; overflow-y: auto;
  }
  .log-head { color: var(--cyan); }
  .log-ok   { color: var(--green); }
  .log-warn { color: var(--amber); }
  .log-err  { color: var(--red); }

  .footer { margin-top: 2rem; font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-align: center; }
  .footer span { color: var(--cyan-dim); }

  #pnav { position: fixed; top: 0; left: 0; right: 0; z-index: 9999; height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 1.25rem; background: #1c1c1e; border-bottom: 2px solid #2e2e32; font-family: 'Space Grotesk', system-ui, sans-serif; }
  #pnav-back { font-size: 0.8rem; font-weight: 500; letter-spacing: 0.01em; color: #8e8e96; text-decoration: none; transition: color 0.12s; }
  #pnav-back:hover { color: #e8e8ea; }
  #pnav-btn { background: none; border: 1.5px solid #2e2e32; border-radius: 3px; color: #6e6e76; cursor: pointer; padding: 5px 7px; line-height: 0; transition: color 0.12s, border-color 0.12s, background 0.12s; }
  #pnav-btn:hover, #pnav-btn.open { color: #e0e0e4; border-color: #4e4e54; background: #28282c; }
  #pnav-pop { position: fixed; top: 48px; right: 1.25rem; background: #1c1c1e; border: 2px solid #3a3a3e; border-radius: 4px; padding: 6px; display: grid; grid-template-columns: 1fr 1fr; gap: 4px; width: 272px; box-shadow: 0 12px 32px rgba(0,0,0,0.6); visibility: hidden; opacity: 0; pointer-events: none; transform: translateY(-6px); transition: opacity 0.14s, transform 0.14s; }
  #pnav-pop.open { visibility: visible; opacity: 1; pointer-events: auto; transform: translateY(0); }
  #pnav-pop a { display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 0.75rem; border-radius: 3px; text-decoration: none; color: #b0b0b8; font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 0.82rem; font-weight: 500; transition: background 0.1s, color 0.1s; }
  #pnav-pop a:hover { background: #28282c; color: #f0f0f2; }
  #pnav-pop a.pnav-cur { background: #28282c; color: #f0f0f2; font-weight: 600; }
</style>
</head>

<script>
(function(){
  var btn=document.getElementById('pnav-btn'),pop=document.getElementById('pnav-pop');
  btn.addEventListener('click',function(e){e.stopPropagation();var o=pop.classList.toggle('open');btn.classList.toggle('open',o);});
  document.addEventListener('click',function(){pop.classList.remove('open');btn.classList.remove('open');});
  pop.addEventListener('click',function(e){e.stopPropagation();});
  var cur=location.pathname.split('/').pop();
  pop.querySelectorAll('a').forEach(function(a){if(decodeURIComponent(a.getAttribute('href'))===cur)a.classList.add('pnav-cur');});
})();
</script>
<div class="wrap">
  <header class="header">
    <div class="header-title">CONVERT //</div>
    <div class="header-sub">Media Utility</div>
    <div class="header-dot"></div>
  </header>

  <!-- Category tabs -->
  <div class="cat-tabs">
    <button class="cat-tab active" data-cat="video">VIDEO</button>
    <button class="cat-tab" data-cat="audio">AUDIO</button>
    <button class="cat-tab" data-cat="image">IMAGE</button>
    <button class="cat-tab" data-cat="data">DATA</button>
  </div>

  <!-- Conversion sub-selector -->
  <div class="conv-selector" id="conv-selector"></div>

  <!-- Work panel -->
  <div class="work-panel">
    <div class="section-label">// Input</div>
    <div class="drop-zone" id="main-dz">
      <input type="file" id="main-file">
      <div class="drop-icon">[ ↓ ]</div>
      <div class="drop-label" id="dz-label">Drop file here</div>
      <div class="drop-hint">or click to browse</div>
      <div class="file-chosen" id="fname"></div>
    </div>

    <!-- Extra options (shown per conversion) -->
    <div id="extra-opts"></div>

    <div class="progress-wrap" id="prog-wrap"><div class="progress-bar" id="prog-bar"></div></div>
    <button class="btn-convert" id="btn-convert" disabled>[ EXECUTE CONVERT ]</button>
    <a class="btn-dl" id="btn-dl">[ ↓ DOWNLOAD ]</a>
  </div>

  <div class="section-label">// System Log</div>
  <div class="log-box" id="log"></div>

  <div class="footer">Powered by <span>FFmpeg.wasm</span> · Canvas API · Runs fully in-browser · No uploads</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
<script>
(function() {
  'use strict';

  // ─────────────────────────────────────────
  // Conversion definitions
  // ─────────────────────────────────────────
  var CONVERSIONS = {
    video: [
      { id: 'webm-gif', label: 'WebM → GIF',  accept: '.webm,video/webm',            hint: 'Drop .webm file' },
      { id: 'mp4-gif',  label: 'MP4 → GIF',   accept: '.mp4,video/mp4',              hint: 'Drop .mp4 file' },
      { id: 'mp4-webm', label: 'MP4 ↔ WebM',  accept: '.mp4,.webm,video/mp4,video/webm', hint: 'Drop .mp4 or .webm file' },
      { id: 'extract',  label: 'Extract Audio',accept: '.mp4,.webm,video/mp4,video/webm', hint: 'Drop .mp4 or .webm file' },
    ],
    audio: [
      { id: 'wav-mp3',  label: 'WAV ↔ MP3',   accept: '.wav,.mp3,audio/wav,audio/mpeg', hint: 'Drop .wav or .mp3 file' },
    ],
    image: [
      { id: 'img-conv', label: 'PNG / JPG / WebP', accept: '.png,.jpg,.jpeg,.webp,image/png,image/jpeg,image/webp', hint: 'Drop .png, .jpg, or .webp file' },
    ],
    data: [
      { id: 'json-csv', label: 'JSON ↔ CSV',   accept: '.json,.csv,application/json,text/csv', hint: 'Drop .json or .csv file' },
    ],
  };

  // ─────────────────────────────────────────
  // State
  // ─────────────────────────────────────────
  var currentCat  = 'video';
  var currentConv = 'webm-gif';
  var currentFile = null;
  var ffmpegReady = false;
  var ffmpeg;
  var FFmpegLib   = window.FFmpeg;
  var timerInterval = null;
  var timerEl = null;

  // ─────────────────────────────────────────
  // Logging
  // ─────────────────────────────────────────
  var logEl = document.getElementById('log');
  function log(msg, cls) {
    var s = document.createElement('span');
    if (cls) s.className = 'log-' + cls;
    s.textContent = msg + '\n';
    logEl.appendChild(s);
    logEl.scrollTop = logEl.scrollHeight;
  }
  function clearLog() { logEl.innerHTML = ''; }

  // ─────────────────────────────────────────
  // Progress
  // ─────────────────────────────────────────
  function setProgress(r) {
    document.getElementById('prog-bar').style.width = Math.min(100, Math.round(r * 100)) + '%';
  }
  function showProgress() { document.getElementById('prog-wrap').classList.add('visible'); setProgress(0); }
  function hideProgress() { document.getElementById('prog-wrap').classList.remove('visible'); }

  // ─────────────────────────────────────────
  // Button / download helpers
  // ─────────────────────────────────────────
  var btnConvert = document.getElementById('btn-convert');
  var btnDl      = document.getElementById('btn-dl');

  function setWorking() {
    btnConvert.disabled = true;
    btnConvert.classList.add('processing');
    btnConvert.textContent = '[ RENDERING... ]';
    btnDl.classList.remove('visible');
    showProgress();
    var startTime = Date.now();
    timerEl = document.createElement('span');
    timerEl.className = 'log-warn';
    timerEl.textContent = 'Elapsed: 0s — large or high-res files may take several minutes\n';
    logEl.appendChild(timerEl);
    timerInterval = setInterval(function() {
      var secs = Math.round((Date.now() - startTime) / 1000);
      if (timerEl) timerEl.textContent = 'Elapsed: ' + secs + 's — large or high-res files may take several minutes\n';
      logEl.scrollTop = logEl.scrollHeight;
    }, 1000);
  }
  function setIdle() {
    btnConvert.disabled = (currentFile === null);
    btnConvert.classList.remove('processing');
    btnConvert.textContent = '[ EXECUTE CONVERT ]';
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    timerEl = null;
  }
  function offerDownload(blob, filename, label) {
    var url = URL.createObjectURL(blob);
    btnDl.href = url;
    btnDl.download = filename;
    btnDl.textContent = label || ('[ ↓ DOWNLOAD ' + filename.split('.').pop().toUpperCase() + ' ]');
    btnDl.classList.add('visible');
  }

  // ─────────────────────────────────────────
  // UI: category tabs + conversion buttons
  // ─────────────────────────────────────────
  document.querySelectorAll('.cat-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.cat-tab').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      currentCat = tab.dataset.cat;
      renderConvButtons();
      selectConv(CONVERSIONS[currentCat][0].id);
    });
  });

  function renderConvButtons() {
    var sel = document.getElementById('conv-selector');
    sel.innerHTML = '';
    CONVERSIONS[currentCat].forEach(function(c) {
      var btn = document.createElement('button');
      btn.className = 'conv-btn' + (c.id === currentConv ? ' active' : '');
      btn.textContent = c.label;
      btn.addEventListener('click', function() { selectConv(c.id); });
      sel.appendChild(btn);
    });
  }

  function selectConv(id) {
    currentConv = id;
    currentFile = null;
    document.getElementById('fname').textContent = '';
    btnConvert.disabled = true;
    btnDl.classList.remove('visible');
    hideProgress();

    // update conv button highlights
    document.querySelectorAll('.conv-btn').forEach(function(b) {
      b.classList.toggle('active', b.textContent === getConvDef(id).label);
    });

    // update drop zone
    var def = getConvDef(id);
    document.getElementById('main-file').accept = def.accept;
    document.getElementById('dz-label').textContent = def.hint;

    // render extra options
    renderOpts(id);
  }

  function getConvDef(id) {
    var all = [].concat(
      CONVERSIONS.video, CONVERSIONS.audio, CONVERSIONS.image, CONVERSIONS.data
    );
    for (var i = 0; i < all.length; i++) { if (all[i].id === id) return all[i]; }
    return all[0];
  }

  // ─────────────────────────────────────────
  // Extra options per conversion
  // ─────────────────────────────────────────
  function renderOpts(id) {
    var el = document.getElementById('extra-opts');
    el.innerHTML = '';

    if (id === 'webm-gif' || id === 'mp4-gif') {
      el.innerHTML = '<div class="slider-opts">' +
        '<div class="slider-row"><label>FPS</label><input type="range" id="opt-fps" min="5" max="24" value="12" step="1"><span class="val" id="opt-fps-val">12 fps</span></div>' +
        '<div class="slider-row"><label>Scale</label><input type="range" id="opt-scale" min="240" max="960" value="480" step="120"><span class="val" id="opt-scale-val">480 px</span></div>' +
        '</div>';
      document.getElementById('opt-fps').addEventListener('input', function() {
        document.getElementById('opt-fps-val').textContent = this.value + ' fps';
      });
      document.getElementById('opt-scale').addEventListener('input', function() {
        document.getElementById('opt-scale-val').textContent = this.value + ' px';
      });
    }

    if (id === 'mp4-webm') {
      el.innerHTML = '<div class="options-row"><span class="options-label">Output Format</span>' +
        '<select id="opt-vidformat"><option value="auto">Auto-detect (flip format)</option><option value="mp4">→ MP4</option><option value="webm">→ WebM</option></select></div>';
    }

    if (id === 'extract') {
      el.innerHTML = '<div class="options-row"><span class="options-label">Audio Format</span>' +
        '<select id="opt-extractfmt"><option value="mp3">MP3</option><option value="wav">WAV</option></select></div>';
    }

    if (id === 'wav-mp3') {
      el.innerHTML = '<div class="options-row"><span class="options-label">Output Format</span>' +
        '<select id="opt-audiofmt"><option value="auto">Auto-detect (flip format)</option><option value="mp3">→ MP3</option><option value="wav">→ WAV</option></select></div>';
    }

    if (id === 'img-conv') {
      el.innerHTML = '<div class="options-row"><span class="options-label">Output Format</span>' +
        '<select id="opt-imgfmt"><option value="png">→ PNG</option><option value="jpeg">→ JPG</option><option value="webp">→ WebP</option></select></div>';
    }

    if (id === 'json-csv') {
      el.innerHTML = '<div class="options-row"><span class="options-label">Output Format</span>' +
        '<select id="opt-datafmt"><option value="auto">Auto-detect (flip format)</option><option value="csv">→ CSV</option><option value="json">→ JSON</option></select></div>';
    }
  }

  // ─────────────────────────────────────────
  // Drop zone / file input
  // ─────────────────────────────────────────
  var mainFile = document.getElementById('main-file');
  var mainDz   = document.getElementById('main-dz');

  mainFile.addEventListener('change', function() {
    if (mainFile.files && mainFile.files[0]) {
      currentFile = mainFile.files[0];
      document.getElementById('fname').textContent = '✓ ' + currentFile.name;
      btnConvert.disabled = false;
    }
  });

  mainDz.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); mainDz.classList.add('drag-over'); });
  mainDz.addEventListener('dragleave', function(e) { e.stopPropagation(); mainDz.classList.remove('drag-over'); });
  mainDz.addEventListener('drop', function(e) {
    e.preventDefault(); e.stopPropagation();
    mainDz.classList.remove('drag-over');
    var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (!f) return;
    currentFile = f;
    mainFile._file = f;
    document.getElementById('fname').textContent = '✓ ' + f.name;
    btnConvert.disabled = false;
  });

  // ─────────────────────────────────────────
  // Convert button dispatch
  // ─────────────────────────────────────────
  btnConvert.addEventListener('click', function() {
    if (!currentFile) return;
    clearLog();
    btnDl.classList.remove('visible');

    switch (currentConv) {
      case 'webm-gif': case 'mp4-gif': runGif();      break;
      case 'mp4-webm':                 runVidConv();   break;
      case 'extract':                  runExtract();   break;
      case 'wav-mp3':                  runAudio();     break;
      case 'img-conv':                 runImage();     break;
      case 'json-csv':                 runData();      break;
    }
  });

  // ─────────────────────────────────────────
  // FFmpeg helpers
  // ─────────────────────────────────────────
  function needsFFmpeg() {
    if (!ffmpegReady) { log('ERROR: FFmpeg not ready yet.', 'err'); return false; }
    return true;
  }

  function ffRun(args, inName, inData, outName, outMime, dlName) {
    return FFmpegLib.fetchFile(currentFile).then(function(data) {
      ffmpeg.FS('writeFile', inName, data);
      log('Encoding...', null);
      return ffmpeg.run.apply(ffmpeg, args);
    }).then(function() {
      var out  = ffmpeg.FS('readFile', outName);
      var blob = new Blob([out.buffer], { type: outMime });
      log('OUTPUT : ' + dlName + ' (' + (blob.size/1024/1024).toFixed(2) + ' MB)', 'ok');
      log('DONE ✓', 'ok');
      offerDownload(blob, dlName);
      try { ffmpeg.FS('unlink', inName);  } catch(e) {}
      try { ffmpeg.FS('unlink', outName); } catch(e) {}
      setIdle();
    }).catch(function(e) {
      log('ERROR: ' + (e.message || String(e)), 'err');
      setIdle();
    });
  }

  // ─────────────────────────────────────────
  // VIDEO → GIF
  // ─────────────────────────────────────────
  function runGif() {
    if (!needsFFmpeg()) return;
    setWorking();

    var ext   = currentFile.name.split('.').pop().toLowerCase();
    var fps   = document.getElementById('opt-fps')   ? document.getElementById('opt-fps').value   : '12';
    var scale = document.getElementById('opt-scale') ? document.getElementById('opt-scale').value : '480';
    var inName = 'input.' + ext;

    log('INPUT  : ' + currentFile.name + ' (' + (currentFile.size/1024/1024).toFixed(2) + ' MB)', 'head');
    log('CONFIG : ' + fps + ' fps · ' + scale + 'px wide', null);

    FFmpegLib.fetchFile(currentFile).then(function(data) {
      ffmpeg.FS('writeFile', inName, data);
      log('Pass 1 : generating palette...', null);
      return ffmpeg.run('-i', inName, '-vf', 'fps='+fps+',scale='+scale+':-1:flags=lanczos,palettegen=max_colors=256', 'palette.png');
    }).then(function() {
      log('Pass 2 : encoding GIF...', null);
      return ffmpeg.run('-i', inName, '-i', 'palette.png', '-filter_complex', 'fps='+fps+',scale='+scale+':-1:flags=lanczos[x];[x][1:v]paletteuse=dither=bayer', 'output.gif');
    }).then(function() {
      var out  = ffmpeg.FS('readFile', 'output.gif');
      var blob = new Blob([out.buffer], { type: 'image/gif' });
      log('OUTPUT : output.gif (' + (blob.size/1024/1024).toFixed(2) + ' MB)', 'ok');
      log('DONE ✓', 'ok');
      offerDownload(blob, currentFile.name.replace(/\.\w+$/, '') + '.gif');
      try { ffmpeg.FS('unlink', inName);      } catch(e) {}
      try { ffmpeg.FS('unlink', 'palette.png'); } catch(e) {}
      try { ffmpeg.FS('unlink', 'output.gif'); } catch(e) {}
      setIdle();
    }).catch(function(e) {
      log('ERROR: ' + (e.message || String(e)), 'err');
      setIdle();
    });
  }

  // ─────────────────────────────────────────
  // MP4 ↔ WebM
  // ─────────────────────────────────────────
  function runVidConv() {
    if (!needsFFmpeg()) return;
    setWorking();

    var ext    = currentFile.name.split('.').pop().toLowerCase();
    var sel    = document.getElementById('opt-vidformat');
    var outExt = sel && sel.value !== 'auto' ? sel.value : (ext === 'mp4' ? 'webm' : 'mp4');
    var inName  = 'input.'  + ext;
    var outName = 'output.' + outExt;
    var mime    = outExt === 'mp4' ? 'video/mp4' : 'video/webm';
    var args;

    log('INPUT  : ' + currentFile.name + ' (' + (currentFile.size/1024/1024).toFixed(2) + ' MB)', 'head');
    log('CONVERT: .' + ext + ' → .' + outExt, null);

    if (outExt === 'webm') {
      args = ['-i', inName, '-c:v', 'libvpx', '-crf', '10', '-b:v', '0', '-c:a', 'libvorbis', outName];
    } else {
      args = ['-i', inName, '-c:v', 'libx264', '-preset', 'fast', '-c:a', 'aac', outName];
    }

    ffRun(args, inName, null, outName, mime, currentFile.name.replace(/\.\w+$/, '') + '.' + outExt);
  }

  // ─────────────────────────────────────────
  // Extract audio from video
  // ─────────────────────────────────────────
  function runExtract() {
    if (!needsFFmpeg()) return;
    setWorking();

    var ext     = currentFile.name.split('.').pop().toLowerCase();
    var fmtSel  = document.getElementById('opt-extractfmt');
    var outExt  = fmtSel ? fmtSel.value : 'mp3';
    var inName  = 'input.'  + ext;
    var outName = 'output.' + outExt;
    var mime    = outExt === 'mp3' ? 'audio/mpeg' : 'audio/wav';
    var args;

    log('INPUT  : ' + currentFile.name + ' (' + (currentFile.size/1024/1024).toFixed(2) + ' MB)', 'head');
    log('EXTRACT: audio → .' + outExt, null);

    if (outExt === 'mp3') {
      args = ['-i', inName, '-vn', '-codec:a', 'libmp3lame', '-qscale:a', '2', outName];
    } else {
      args = ['-i', inName, '-vn', '-codec:a', 'pcm_s16le', outName];
    }

    ffRun(args, inName, null, outName, mime, currentFile.name.replace(/\.\w+$/, '') + '.' + outExt);
  }

  // ─────────────────────────────────────────
  // WAV ↔ MP3
  // ─────────────────────────────────────────
  function runAudio() {
    if (!needsFFmpeg()) return;
    setWorking();

    var ext    = currentFile.name.split('.').pop().toLowerCase();
    var sel    = document.getElementById('opt-audiofmt');
    var outExt = sel && sel.value !== 'auto' ? sel.value : (ext === 'wav' ? 'mp3' : 'wav');
    var inName  = 'input.'  + ext;
    var outName = 'output.' + outExt;
    var mime    = outExt === 'mp3' ? 'audio/mpeg' : 'audio/wav';
    var args    = ['-i', inName];

    log('INPUT  : ' + currentFile.name + ' (' + (currentFile.size/1024/1024).toFixed(2) + ' MB)', 'head');
    log('CONVERT: .' + ext + ' → .' + outExt, null);

    if (outExt === 'mp3') { args.push('-codec:a', 'libmp3lame', '-qscale:a', '2'); }
    else                  { args.push('-codec:a', 'pcm_s16le'); }
    args.push(outName);

    ffRun(args, inName, null, outName, mime, currentFile.name.replace(/\.\w+$/, '') + '.' + outExt);
  }

  // ─────────────────────────────────────────
  // Image conversion (Canvas API — no FFmpeg)
  // ─────────────────────────────────────────
  function runImage() {
    setWorking();

    var sel    = document.getElementById('opt-imgfmt');
    var outFmt = sel ? sel.value : 'png';
    var mime   = outFmt === 'jpeg' ? 'image/jpeg' : outFmt === 'webp' ? 'image/webp' : 'image/png';
    var ext    = outFmt === 'jpeg' ? 'jpg' : outFmt;

    log('INPUT  : ' + currentFile.name, 'head');
    log('CONVERT: → .' + ext + ' via Canvas API', null);

    var url = URL.createObjectURL(currentFile);
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      canvas.width  = img.naturalWidth;
      canvas.height = img.naturalHeight;
      var ctx = canvas.getContext('2d');
      if (outFmt === 'jpeg') { ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height); }
      ctx.drawImage(img, 0, 0);
      canvas.toBlob(function(blob) {
        if (!blob) { log('ERROR: canvas conversion failed.', 'err'); setIdle(); return; }
        log('OUTPUT : ' + (blob.size/1024).toFixed(0) + ' KB', 'ok');
        log('DONE ✓', 'ok');
        offerDownload(blob, currentFile.name.replace(/\.\w+$/, '') + '.' + ext);
        URL.revokeObjectURL(url);
        setProgress(1);
        setIdle();
      }, mime, 0.92);
    };
    img.onerror = function() {
      log('ERROR: could not load image.', 'err');
      URL.revokeObjectURL(url);
      setIdle();
    };
    img.src = url;
  }

  // ─────────────────────────────────────────
  // JSON ↔ CSV (pure JS)
  // ─────────────────────────────────────────
  function runData() {
    setWorking();

    var ext    = currentFile.name.split('.').pop().toLowerCase();
    var sel    = document.getElementById('opt-datafmt');
    var outExt = sel && sel.value !== 'auto' ? sel.value : (ext === 'json' ? 'csv' : 'json');

    log('INPUT  : ' + currentFile.name, 'head');
    log('CONVERT: .' + ext + ' → .' + outExt, null);

    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var result, blob;
        if (outExt === 'csv') {
          // JSON → CSV
          var parsed = JSON.parse(e.target.result);
          var rows = Array.isArray(parsed) ? parsed : [parsed];
          var keys = Object.keys(rows[0] || {});
          var csvLines = [keys.map(csvEscape).join(',')];
          rows.forEach(function(row) {
            csvLines.push(keys.map(function(k) { return csvEscape(row[k] !== undefined ? row[k] : ''); }).join(','));
          });
          result = csvLines.join('\r\n');
          blob = new Blob([result], { type: 'text/csv' });
        } else {
          // CSV → JSON
          var lines = e.target.result.trim().split(/\r?\n/);
          var headers = parseCsvLine(lines[0]);
          var jsonRows = [];
          for (var i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            var vals = parseCsvLine(lines[i]);
            var obj  = {};
            headers.forEach(function(h, idx) { obj[h] = vals[idx] !== undefined ? vals[idx] : ''; });
            jsonRows.push(obj);
          }
          result = JSON.stringify(jsonRows, null, 2);
          blob = new Blob([result], { type: 'application/json' });
        }
        log('OUTPUT : ' + (blob.size/1024).toFixed(1) + ' KB', 'ok');
        log('DONE ✓', 'ok');
        offerDownload(blob, currentFile.name.replace(/\.\w+$/, '') + '.' + outExt);
        setProgress(1);
        setIdle();
      } catch(err) {
        log('ERROR: ' + (err.message || String(err)), 'err');
        setIdle();
      }
    };
    reader.readAsText(currentFile);
  }

  function csvEscape(v) {
    var s = String(v);
    if (s.includes(',') || s.includes('"') || s.includes('\n')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }

  function parseCsvLine(line) {
    var result = [], cur = '', inQ = false;
    for (var i = 0; i < line.length; i++) {
      var c = line[i];
      if (c === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else { inQ = !inQ; }
      } else if (c === ',' && !inQ) {
        result.push(cur); cur = '';
      } else { cur += c; }
    }
    result.push(cur);
    return result;
  }

  // ─────────────────────────────────────────
  // Init
  // ─────────────────────────────────────────
  log('CONVERT // Media Utility', 'head');
  log('Loading FFmpeg.wasm core...', null);

  // Render initial UI
  renderConvButtons();
  selectConv('webm-gif');

  if (!FFmpegLib || typeof FFmpegLib.createFFmpeg !== 'function') {
    log('ERROR: FFmpeg library did not load from CDN.', 'err');
    log('Check connection and refresh. Image/Data conversions still work.', 'warn');
  } else {
    ffmpeg = FFmpegLib.createFFmpeg({
      log: true,
      logger: function(msg) {
        var m = msg.message || '';
        if (m.indexOf('frame=') !== -1 || m.indexOf('size=') !== -1) {
          var el = document.getElementById('ff-progress-line');
          if (!el) {
            el = document.createElement('span');
            el.id = 'ff-progress-line';
            el.style.color = 'var(--text-dim)';
            logEl.appendChild(el);
          }
          el.textContent = m.trim() + '\n';
          logEl.scrollTop = logEl.scrollHeight;
        }
      },
      corePath: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
      progress: function(p) { setProgress(p.ratio); }
    });

    ffmpeg.load().then(function() {
      ffmpegReady = true;
      clearLog();
      log('CONVERT // ready', 'head');
      log('FFmpeg core loaded. Select a conversion and drop a file.', null);
    }).catch(function(e) {
      clearLog();
      log('ERROR: FFmpeg core failed to load.', 'err');
      log(e.message || String(e), 'err');
      log('NOTE: Image and Data conversions still work without FFmpeg.', 'warn');
    });
  }

})();
</script>
</body>
</html>
